<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rebar splice length reference table</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; background-color: #f4f7f6; color: #333; margin: 0; }
        .container { max-width: 500px; margin: 10px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #2c3e50; font-size: 20px; margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label.section-title { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #34495e; }
        
        select { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; background-color: #fcfcfc; color: #2c3e50; appearance: none; font-size: 16px; font-weight: 500;}
        
        .pill-group { display: grid; gap: 10px; }
        .grid-4 { grid-template-columns: repeat(4, 1fr); } 
        .grid-3 { grid-template-columns: repeat(3, 1fr); } 
        
        .pill-group input[type="radio"] { display: none; }
        .pill-group label {
            background: #fff;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            padding: 12px 2px;
            text-align: center;
            font-size: 15px;
            color: #34495e;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none; 
        }
        
        .pill-group input[type="radio"]:checked + label {
            background: #2c3e50;
            color: #fff;
            border-color: #2c3e50;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(44, 62, 80, 0.3);
        }

        .result-box { margin-top: 15px; padding: 15px; border-radius: 8px; text-align: center; }
        .tal-box { background-color: #e8f4fd; border: 2px solid #b6dcf9; }
        .tll-good-box { background-color: #eef9e8; border: 2px solid #c3e6b3; }
        .tll-poor-box { background-color: #fcf0e4; border: 2px solid #f6cda0; }
        .result-title { font-size: 14px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .result-value { font-size: 36px; font-weight: 900; color: #2c3e50; }
        .unit { font-size: 16px; font-weight: normal; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h2>📏 Rebar splice length reference table APP</h2>
    
    <div class="form-group">
        <label class="section-title">Concrete Grade (fck):</label>
        <select id="grade">
            <option value="25">C25/30</option>
            <option value="28">C28/35</option>
            <option value="32" selected>C32/40</option>
            <option value="35">C35/45</option>
            <option value="40">C40/50</option>
            <option value="50">C50/60</option>
        </select>
    </div>

    <div class="form-group">
        <label class="section-title">Bar Diameter Φ (mm):</label>
        <div class="pill-group grid-4">
            <input type="radio" name="diameter" id="d10" value="10"><label for="d10">10</label>
            <input type="radio" name="diameter" id="d12" value="12"><label for="d12">12</label>
            <input type="radio" name="diameter" id="d16" value="16"><label for="d16">16</label>
            <input type="radio" name="diameter" id="d20" value="20"><label for="d20">20</label>
            <input type="radio" name="diameter" id="d25" value="25"><label for="d25">25</label>
            <input type="radio" name="diameter" id="d32" value="32"><label for="d32">32</label>
            <input type="radio" name="diameter" id="d40" value="40" checked><label for="d40">40</label>
            <input type="radio" name="diameter" id="d50" value="50"><label for="d50">50</label>
        </div>
    </div>

    <div class="form-group">
        <label class="section-title">ANCHORAGE LENGTHS AND LAP LENGTHS:</label>
        <div class="pill-group grid-3">
            <input type="radio" name="version" id="v_base" value="base" checked><label for="v_base">BASIC REQUIRED</label>
            <input type="radio" name="version" id="v_adv50" value="adv50"><label for="v_adv50">进阶版 50%</label>
            <input type="radio" name="version" id="v_adv100" value="adv100"><label for="v_adv100">进阶版 100%</label>
        </div>
    </div>

    <div class="result-box tal-box">
        <div class="result-title">T.A.L. </div>
        <div class="result-value"><span id="tal_res">0</span> <span class="unit">mm</span></div>
    </div>

    <div class="result-box tll-good-box">
        <div class="result-title">T.L.L. (Good Bond)</div>
        <div class="result-value"><span id="tll_good_res">0</span> <span class="unit">mm</span></div>
    </div>

    <div class="result-box tll-poor-box">
        <div class="result-title">T.L.L. (Poor Bond)</div>
        <div class="result-value"><span id="tll_poor_res">0</span> <span class="unit">mm</span></div>
    </div>
</div>

<script>
    // 144个图表数值全录入
    const data_base = {
        '25': {10:740, 12:890, 16:1190, 20:1480, 25:1850, 32:2370, 40:3220, 50:4510},
        '28': {10:700, 12:830, 16:1110, 20:1390, 25:1730, 32:2210, 40:3010, 50:4210},
        '32': {10:650, 12:780, 16:1040, 20:1300, 25:1620, 32:2080, 40:2820, 50:3950},
        '35': {10:580, 12:700, 16:930, 20:1160, 25:1440, 32:1850, 40:2510, 50:3510},
        '40': {10:550, 12:660, 16:880, 20:1090, 25:1370, 32:1750, 40:2370, 50:3330},
        '50': {10:550, 12:600, 16:790, 20:990, 25:1240, 32:1580, 40:2150, 50:3010}
    };
    const data_50 = {
        '25': {10:1040, 12:1250, 16:1670, 20:2080, 25:2590, 32:3320, 40:4510, 50:6320},
        '28': {10:980, 12:1170, 16:1560, 20:1950, 25:2430, 32:3100, 40:4220, 50:5900},
        '32': {10:910, 12:1100, 16:1460, 20:1820, 25:2270, 32:2920, 40:3950, 50:5530},
        '35': {10:820, 12:980, 16:1310, 20:1630, 25:2020, 32:2590, 40:3520, 50:4920},
        '40': {10:770, 12:930, 16:1240, 20:1530, 25:1920, 32:2450, 40:3320, 50:4670},
        '50': {10:770, 12:840, 16:1110, 20:1390, 25:1740, 32:2220, 40:3010, 50:4220}
    };
    const data_100 = {
        '25': {10:1110, 12:1340, 16:1790, 20:2220, 25:2780, 32:3560, 40:4830, 50:6770},
        '28': {10:1050, 12:1250, 16:1670, 20:2090, 25:2600, 32:3320, 40:4520, 50:6320},
        '32': {10:980, 12:1170, 16:1560, 20:1950, 25:2430, 32:3120, 40:4230, 50:5930},
        '35': {10:870, 12:1050, 16:1400, 20:1740, 25:2160, 32:2780, 40:3770, 50:5270},
        '40': {10:830, 12:990, 16:1320, 20:1640, 25:2060, 32:2630, 40:3560, 50:5000},
        '50': {10:830, 12:900, 16:1190, 20:1490, 25:1860, 32:2370, 40:3230, 50:4520}
    };

    function calculate() {
        const grade = document.getElementById('grade').value;
        const d = document.querySelector('input[name="diameter"]:checked').value;
        const version = document.querySelector('input[name="version"]:checked').value;

        const base_val = data_base[grade][d];
        const val_50 = data_50[grade][d];
        const val_100 = data_100[grade][d];

        // T.A.L 计算
        document.getElementById('tal_res').innerText = Math.round(base_val * 0.7);

        // 良好 T.L.L 计算
        let tll_good = 0;
        if (version === 'base') tll_good = Math.round(base_val * 0.7);
        else if (version === 'adv50') tll_good = Math.round(base_val * 0.98);
        else tll_good = Math.round(base_val * 1.05);
        
        document.getElementById('tll_good_res').innerText = tll_good;

        // 较差 T.L.L 计算
        let tll_poor = 0;
        if (version === 'base') tll_poor = base_val;
        else if (version === 'adv50') tll_poor = val_50;
        else tll_poor = val_100;

        document.getElementById('tll_poor_res').innerText = tll_poor;
    }

    document.querySelectorAll('select, input[type="radio"]').forEach(el => el.onchange = calculate);
    calculate();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(registration => {
                console.log('ServiceWorker 注册成功: ', registration.scope);
            }).catch(err => {
                console.log('ServiceWorker 注册失败: ', err);
            });
        });
    }
</script>
</body>
</html>
